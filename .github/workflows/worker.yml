name: Video worker (multi-user)

# Runs on 6 slots a day. At EACH slot it (1) queues a fresh video for every
# auto-daily user, then (2) builds + uploads it to that user's own channel.
# So each user gets up to ~6 videos/day automatically. + a manual button.
on:
  schedule:
    # 3 slots/day (users' channels), interleaved with the owner bot's 3 slots
    # so together they stay within the project's ~6 uploads/day quota.
    - cron: "30 5 * * *"    # 11:00 IST
    - cron: "30 10 * * *"   # 16:00 IST
    - cron: "0 16 * * *"    # 21:30 IST
  workflow_dispatch: {}

concurrency:
  group: video-worker
  cancel-in-progress: false

jobs:
  work:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ffmpeg + fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core fonts-lohit-deva

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Queue a fresh video for each auto-daily user
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python enqueue_daily.py

      - name: Build + upload queued videos
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YT_PRIVACY: "public"
          MAX_JOBS: "10"
        run: python worker.py
