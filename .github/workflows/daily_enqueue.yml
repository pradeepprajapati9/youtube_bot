name: Auto-daily enqueue

# Once a day, queue one video for every user who enabled auto-daily.
# The "Video worker" (runs every 30 min) then builds + uploads them.
on:
  schedule:
    - cron: "30 1 * * *"    # 07:00 IST daily
  workflow_dispatch: {}

concurrency:
  group: daily-enqueue
  cancel-in-progress: false

jobs:
  enqueue:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Queue daily jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python enqueue_daily.py
