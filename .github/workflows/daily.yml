name: Daily YouTube Short

# Runs every day + a manual "Run workflow" button in the Actions tab.
on:
  schedule:
    # Best-engagement upload slots for an India audience (UTC = IST - 5:30).
    # Each run produces + uploads the thinker_bot's single best ready idea,
    # so uploads land at peak times and spread across the day.
    - cron: "30 2 * * *"    # 08:00 IST  (morning)
    - cron: "30 7 * * *"    # 13:00 IST  (lunch)
    - cron: "30 12 * * *"   # 18:00 IST  (evening)
    - cron: "0 16 * * *"    # 21:30 IST  (night peak)
  workflow_dispatch: {}       # manual trigger button

permissions:
  contents: write             # allow committing updated state.json back

concurrency:
  group: daily-short
  cancel-in-progress: false

jobs:
  make-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg + fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore credentials from secrets
        run: |
          mkdir -p credentials
          printf '%s' '${{ secrets.YT_CLIENT_SECRET }}' > credentials/client_secret.json
          printf '%s' '${{ secrets.YT_TOKEN }}'         > credentials/token.json

      - name: Run the bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          VIDEO_LANG: en
          TREND_GEO: IN
          CONTENT_MODE: evergreen
          YT_PRIVACY: public
          DO_UPLOAD: "true"
          CLEAN_AFTER_UPLOAD: "true"
        run: python main.py

      - name: Persist state + idea backlog
        if: always()
        run: |
          git config user.name "youtube-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase --autostash origin main || true
          git add state.json backlog.json || true
          git commit -m "chore: update state + idea backlog [skip ci]" || echo "no change"
          git push || echo "nothing to push"
