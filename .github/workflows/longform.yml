name: Weekly Long-form Video

# One longer (4-7 min) ad-friendly video per week + a manual "Run workflow" button.
on:
  schedule:
    - cron: "0 7 * * 0"     # Sundays 12:30 IST (07:00 UTC)
  workflow_dispatch: {}       # manual trigger button

permissions:
  contents: write             # allow committing longform_state.json back

concurrency:
  group: longform
  cancel-in-progress: false

jobs:
  make-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ffmpeg + fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core fonts-lohit-deva

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore credentials from secrets
        run: |
          mkdir -p credentials
          printf '%s' '${{ secrets.YT_CLIENT_SECRET }}' > credentials/client_secret.json
          printf '%s' '${{ secrets.YT_TOKEN }}'         > credentials/token.json

      - name: Run the long-form bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          VIDEO_LANG: en
          TREND_GEO: IN
          CONTENT_MODE: evergreen
          YT_PRIVACY: public
          DO_UPLOAD: "true"
          CLEAN_AFTER_UPLOAD: "true"
          LONGFORM_FACTS: "12"
        run: python longform.py

      - name: Persist long-form state
        if: always()
        run: |
          git config user.name "youtube-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase --autostash origin main || true
          git add longform_state.json || true
          git commit -m "chore: update longform state [skip ci]" || echo "no change"
          git push || echo "nothing to push"
