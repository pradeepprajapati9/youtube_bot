<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login • YouTube_Bot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="center">
    <div class="card">
      <div class="logo">You<span>Tube</span>_Bot</div>
      <div class="subtitle">Sign in to auto-create &amp; upload videos to your own YouTube channel</div>

      <button class="btn green" id="googleBtn">🔵 Sign in with Google (YouTube)</button>
      <div class="error" id="error"></div>

      <div class="hint">
        We use this only to upload videos to <b>your own</b> channel.<br />
        <small>You can disconnect anytime from your Google account.</small>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    (async function () {
      // already logged in? -> dashboard
      const { data: { session } } = await sb.auth.getSession();
      if (session) { location.replace("dashboard.html"); return; }

      document.getElementById("googleBtn").addEventListener("click", async () => {
        const redirectTo = new URL("dashboard.html", window.location.href).href;
        const { error } = await sb.auth.signInWithOAuth({
          provider: "google",
          options: {
            scopes:
              "https://www.googleapis.com/auth/youtube.upload " +
              "https://www.googleapis.com/auth/youtube.readonly",
            // offline + consent => Google returns a REFRESH token (bot uploads later)
            queryParams: { access_type: "offline", prompt: "consent" },
            redirectTo,
          },
        });
        if (error) document.getElementById("error").textContent = error.message;
      });
    })();
  </script>
</body>
</html>
